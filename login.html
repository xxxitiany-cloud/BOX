<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f3ee">
  <title>登录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Shared Workspace</p>
        <h1>登录共享菜谱</h1>
        <p class="hero-copy">登录后才能访问当前工作区里的共享菜谱和食材。</p>
      </div>
    </header>

    <form id="loginForm" class="form-card">
      <label class="field">
        <span>邮箱</span>
        <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com" required>
      </label>

      <button id="loginButton" class="button button-primary button-block" type="submit">发送登录链接</button>
    </form>

    <section id="loginInfo" class="panel auth-info" hidden></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
